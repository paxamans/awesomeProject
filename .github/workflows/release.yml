name: Build and Release

on:
  push:
    tags:
      - 'v*' # Triggers on any tag push starting with v (e.g., v1.0.0, v2.1.3-beta)
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build-and-release:
    name: Build & Release Windows Binary
    runs-on: windows-latest
    permissions:
      contents: write # Required for softprops/action-gh-release to upload release assets

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Setup MinGW GCC Compiler
        uses: bwoodsend/setup-winlibs-action@v1

      - name: Check GCC Compiler Version
        run: gcc --version

      - name: Build Optimized Standard Binary
        env:
          CGO_ENABLED: '1'
        run: |
          go build -ldflags="-H=windowsgui -s -w" -o aam.exe

      - name: Package with Fyne Tool (Adds Icon & Manifest)
        env:
          CGO_ENABLED: '1'
        run: |
          go run fyne.io/fyne/v2/cmd/fyne@v2.3.5 package -os windows -icon saves/awesome_logo.png

      - name: Prepare Release Assets
        shell: pwsh
        run: |
          # 1. Compress the standalone, optimized single-file binary
          Compress-Archive -Path aam.exe -DestinationPath aam-portable.zip
          
          # 2. Check and rename Fyne's packaged application ZIP
          if (Test-Path "awesome-autostart-app-manager.zip") {
            Copy-Item "awesome-autostart-app-manager.zip" "aam-branded-installer.zip"
          }

      - name: Deploy to GitHub Releases
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            aam.exe
            aam-portable.zip
            aam-branded-installer.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
